# config/packages/security.yaml
security:
    # 1. Gestion du hachage des mots de passe
    # Même si tu utilises md5() dans ton controller, Symfony a besoin d'un hasher par défaut.
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Définition du fournisseur d'utilisateurs
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Users
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # 3. Ton firewall API personnalisé
        api:
            pattern: ^/api
            stateless: true
            # On ne met PAS "jwt: true" ici car tu n'as pas le bundle installé.
            # Ta sécurité est gérée manuellement dans tes controllers.
            security: true

        main:
            lazy: true
            provider: app_user_provider

    # 4. Contrôle d'accès
    # Ici, on autorise l'accès anonyme à l'inscription et la connexion.
    # Le reste de l'API (^/api) pourrait être restreint plus tard.
    access_control:
        - { path: ^/api/user/sign, roles: PUBLIC_ACCESS }
        - { path: ^/api/user/login, roles: PUBLIC_ACCESS }
        # Tu peux décommenter la ligne suivante pour protéger tout le reste de l'API :
        # - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
